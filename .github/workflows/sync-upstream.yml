name: Sync with Upstream

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: "0 * * * *" # Runs every hour
  workflow_dispatch:      # Allows manual trigger

jobs:
  sync_with_upstream:
    runs-on: ubuntu-latest
    name: Sync main with upstream

    # Only run this if we are inside the Pixley Fork
    if: github.repository == 'Pixley-Research-Group-in-CMT/FSS'

    steps:
      # 1. Use the official Checkout action (Allowed by default)
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Mirror upstream/main exactly (cannot diverge, unlike --ff-only merge)
      - name: Mirror Upstream
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          git remote add upstream https://github.com/hainingpan/FSS.git
          git fetch upstream
          git reset --hard upstream/main
          git push --force origin main

      # 3. Anti-Hibernation: re-enable this workflow via the API.
      #    This resets GitHub's 60-day scheduled-workflow timer WITHOUT
      #    creating commits, so the fork can never diverge from upstream.
      - name: Anti-Hibernation Ping
        run: gh api -X PUT "repos/${GITHUB_REPOSITORY}/actions/workflows/sync-upstream.yml/enable"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
